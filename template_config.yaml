node:
  identity:
    nsec: {NSEC}
    node_info:
    - npub: {NPUB}
      alias: {ALIAS}
      addresses:
      - transport: tcp
        addr: {ADDR}:{TCP_PORT}
      - transport: udp
        addr: {ADDR}:{UDP_PORT}
tun:
  enabled: true
  name: fips0
  mtu: 1280
transports:
  tcp:
    bind_addr: 0.0.0.0:{TCP_PORT}
  udp:
    bind_addr: 0.0.0.0:{UDP_PORT}